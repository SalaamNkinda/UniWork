<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen - Login</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

    <div class="split-screen-container">
        <div class="login-form-side">
            <div class="form-wrapper">
                <div class="logo">
                    <span class="logo-icon">🔥</span> <strong>Kitchen</strong>
                </div>
                
                <h1>Login</h1>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Employee Username</label>
                        <input type="text" id="username" autocomplete="username" placeholder="Enter your assigned username" required>
                    </div>

                    <div class="form-group">
                        <label for="password">PIN</label>
                        <input type="password" id="password" autocomplete="current-password" placeholder="••••" required>
                    </div>

                    <div class="form-options">
                        <label><input type="checkbox" id="rememberMe"> Remember Me</label>
                    </div>

                    <button type="submit" class="btn-login">Log In</button>
                    
                    <div id="errorMessage" class="alert alert-danger hidden">
                        <span class="alert-icon">⚠️</span>
                        <span id="errorText">Invalid credentials. Please try again.</span>
                    </div>

                    </form>

                <div class="footer-copyright">
                    Copyright © 2026 The Bald Gingers. <br>
                    <a href="#">Terms of Service</a> | <a href="#">Privacy Policy</a>
                </div>
            </div>
        </div>

        <div class="login-image-side"></div>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
