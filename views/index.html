<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen - Login</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

    <div class="split-screen-container">
        <div class="login-form-side">
            <div class="form-wrapper">
                <div class="logo">
                    <span class="logo-icon">🔥</span> <strong>Kitchen</strong>
                </div>
                
                <h1>Login</h1>
                <p class="subtitle">Don't have an account? <a href="#">Get Access Now</a></p>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Employee ID / Role</label>
                        <input type="text" id="username" placeholder="Enter admin, waiter, or chef" required>
                    </div>

                    <div class="form-group">
                        <label for="password">PIN</label>
                        <input type="password" id="password" placeholder="••••" required>
                    </div>

                    <div class="form-options">
                        <label><input type="checkbox" id="rememberMe"> Remember Me</label>
                    </div>

                    <button type="submit" class="btn-login">Log In</button>
                    
                    <div id="errorMessage" style="color: red; font-size: 14px; margin-top: 10px; text-align: center; display: none;">
                        Invalid credentials. Please try again.
                    </div>

                    <a href="#" class="forgot-link">Forgot Your Password?</a>
                </form>

                <div class="footer-copyright">
                    Copyright © 2026 The Bald Gingers. <br>
                    <a href="#">Terms of Service</a> | <a href="#">Privacy Policy</a>
                </div>
            </div>
        </div>

        <div class="login-image-side"></div>
    </div>

    <script>
        // COOKIE HELPER FUNCTIONS 
        function setCookie(name, value, days) {
            let expires = "";
            if (days) {
                const date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                expires = "; expires=" + date.toUTCString();
            }
            document.cookie = name + "=" + (value || "") + expires + "; path=/; SameSite=Strict";
        }

        function getCookie(name) {
            const nameEQ = name + "=";
            const ca = document.cookie.split(';');
            for (let i = 0; i < ca.length; i++) {
                let c = ca[i];
                while (c.charAt(0) == ' ') c = c.substring(1, c.length);
                if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length, c.length);
            }
            return null;
        }

        // 2. HASHING FUNCTION (SHA-256)
        async function hashPin(pin) {
            const encoder = new TextEncoder();
            const data = encoder.encode(pin);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // 3. ON PAGE LOAD: Check "Remember Me"
        window.onload = () => {
            const rememberedUser = getCookie('remembered_user');
            if (rememberedUser) {
                document.getElementById('username').value = rememberedUser;
                document.getElementById('rememberMe').checked = true;
            }
        };

        // LOGIN LOGIC 
        document.getElementById('loginForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            
            const usernameInput = document.getElementById('username');
            const pinInput = document.getElementById('password');
            const rememberMe = document.getElementById('rememberMe').checked;
            const errorDiv = document.getElementById('errorMessage');

            const username = usernameInput.value.toLowerCase().trim();
            const pin = pinInput.value;

            // Hash the PIN before any checks/sending
            const hashedPin = await hashPin(pin);
            console.log("Hashed PIN to check against DB:", hashedPin);

            // Handle "Remember Me" Cookie
            if (rememberMe) {
                setCookie('remembered_user', username, 30); // Save for 30 days
            } else {
                setCookie('remembered_user', '', -1); // Delete cookie
            }

            // REDIRECTION LOGIC 
            // In a real app, you would fetch('/api/login') here.
            if (username === 'admin') {
                setCookie('user_role', 'admin', 1);
                window.location.href = '/dashboard.html';
            } else if (username === 'waiter') {
                setCookie('user_role', 'waiter', 1);
                window.location.href = '/pos.html';
            } else if (username === 'chef') {
                setCookie('user_role', 'chef', 1);
                window.location.href = '/inventory.html';
            } else {
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
