<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inventory | Salaam's Grill</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <h1><i class="fas fa-utensils"></i> Salaam's Grill: Inventory</h1>
        <div class="nav-links">
            <button onclick="showSection('ingredients-section')">Ingredients</button>
            <button onclick="showSection('recipe-section')">Recipe Builder</button>
            <button onclick="showSection('wastage-section')" style="color: #fecaca;">Log Wastage</button>
        </div>
    </nav>

    <div class="container">
        
        <section id="ingredients-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2>Kitchen Stock</h2>
                <button class="btn-primary" onclick="toggleModal('ingredient-modal')" style="background-color: var(--success-green); color: white; padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer;">
                    <i class="fas fa-plus"></i> Add Ingredient
                </button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Ingredient</th>
                            <th>Stock Level</th>
                            <th>Unit Cost</th>
                            <th>Supplier</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="ingredients-table-body">
                        </tbody>
                </table>
            </div>
        </section>

        <section id="recipe-section" class="hidden">
            <h2>Recipe Builder & Auto-Costing [cite: 15-19]</h2>
            <div class="recipe-grid">
                <div class="form-card">
                    <form id="recipe-form">
                        <label>Dish Name</label>
                        <input type="text" id="dish_name" required style="width: 100%; margin-bottom: 1rem;">
                        
                        <div style="display: flex; gap: 1rem;">
                            <div style="flex: 1;">
                                <label>Category</label>
                                <select id="dish_category" style="width: 100%;">
                                    <option>Pizza</option><option>Sides</option><option>Drinks</option>
                                </select>
                            </div>
                            <div style="flex: 1;">
                                <label>Price ($)</label>
                                <input type="number" id="selling_price" step="0.01" required style="width: 100%;">
                            </div>
                        </div>
                        </form>
                </div>

                <div class="form-card" style="background: #eff6ff; border: 1px solid #bfdbfe;">
                    <h3>Auto-Costing Preview</h3>
                    <div id="cost-preview">Production Cost: $0.00</div>
                    <div id="margin-preview">Margin: 0%</div>
                </div>
            </div>
        </section>
    </div>

    <div id="ingredient-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>Add Raw Ingredient</h3>
            <form id="add-ingredient-form">
                <input type="text" id="new_name" placeholder="Name" required style="width: 100%; margin-bottom: 10px;">
                <input type="number" id="new_stock" placeholder="Initial Stock" required style="width: 100%; margin-bottom: 10px;">
                <input type="text" id="new_unit" placeholder="Unit (e.g. kg)" required style="width: 100%; margin-bottom: 10px;">
                <div style="display: flex; justify-content: flex-end; gap: 10px;">
                    <button type="button" onclick="toggleModal('ingredient-modal')">Cancel</button>
                    <button type="submit" style="background: var(--success-green); color: white;">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/main.js"></script>
</body>
</html>
